name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: 🔍 lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt would rewrite the following files:"
            echo "$diff"
            exit 1
          fi

  unit:
    name: 🧪 unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

      - name: go test -race -short
        # -short skips perf tests that do real network probes; -race catches
        # channel / semaphore / goroutine mistakes cheaply.
        run: go test -race -short ./...

  performance:
    name: ⚡ performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: pipeline perf tests
        # Uses TEST-NET-1 (192.0.2.1, RFC 5737) which is dropped upstream —
        # gives clean TCP timeouts shaped like real DPI blocks, so tests
        # work on any runner with routable internet. Generous outer timeout
        # so a flaky shared runner doesn't kill the whole job mid-probe;
        # the inner test deadline is 120s, so 240s leaves room for CI overhead.
        run: go test -v -run 'TestPipeline' -timeout 240s ./internal/engine/
