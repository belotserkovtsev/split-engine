name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build, vet, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests (-race, -short)
        # -short skips perf tests that do real network probes; -race catches
        # channel / semaphore / goroutine mistakes cheaply.
        run: go test -race -short ./...

      - name: Pipeline perf tests
        # Uses TEST-NET-1 (192.0.2.1, RFC 5737) which is dropped upstream —
        # gives clean TCP timeouts shaped like real DPI blocks, so tests
        # work on any runner with routable internet.
        run: go test -v -run 'TestPipeline' -timeout 60s ./internal/engine/
