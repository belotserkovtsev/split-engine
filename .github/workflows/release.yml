name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: 🏗 build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build static binary
        env:
          ARCH: ${{ matrix.arch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          STAGE="dist/ladon-linux-${ARCH}-${TAG}"
          mkdir -p "${STAGE}"
          CGO_ENABLED=0 GOOS=linux GOARCH="${ARCH}" \
            go build -trimpath -ldflags="-s -w -X main.version=${TAG}" \
            -o "${STAGE}/ladon" ./cmd/ladon

          cp release/ladon.service            "${STAGE}/"
          cp release/manual-allow.txt.example "${STAGE}/"
          cp release/manual-deny.txt.example  "${STAGE}/"
          cp release/config.yaml.example      "${STAGE}/"
          cp release/INSTALL.md               "${STAGE}/"
          cp README.md                        "${STAGE}/"
          cp -r release/extensions            "${STAGE}/"

          tar -czf "dist/ladon-linux-${ARCH}.tar.gz" -C dist "ladon-linux-${ARCH}-${TAG}"
          # sha256 file must contain the bare filename so `sha256sum -c` works
          # when the user downloads the tarball into an arbitrary directory.
          (cd dist && sha256sum "ladon-linux-${ARCH}.tar.gz" \
            > "ladon-linux-${ARCH}.tar.gz.sha256")

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladon-linux-${{ matrix.arch }}
          path: |
            dist/ladon-linux-${{ matrix.arch }}.tar.gz
            dist/ladon-linux-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 7

  publish:
    name: 📦 publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list bundle
        run: ls -la dist/

      - name: publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
