name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: 🏗 build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build static binary
        env:
          ARCH: ${{ matrix.arch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          STAGE="dist/ladon-linux-${ARCH}-${TAG}"
          mkdir -p "${STAGE}"
          CGO_ENABLED=0 GOOS=linux GOARCH="${ARCH}" \
            go build -trimpath -ldflags="-s -w -X main.version=${TAG}" \
            -o "${STAGE}/ladon" ./cmd/ladon

          # Tarball is runtime-only — docs (README, install, methodology, etc.)
          # live in the repo under docs/ and are read on GitHub.
          cp release/ladon.service            "${STAGE}/"
          cp release/manual-allow.txt.example "${STAGE}/"
          cp release/manual-deny.txt.example  "${STAGE}/"
          cp release/config.yaml.example      "${STAGE}/"
          cp release/install.sh               "${STAGE}/"
          cp release/uninstall.sh             "${STAGE}/"
          cp -r release/extensions            "${STAGE}/"

          tar -czf "dist/ladon-linux-${ARCH}.tar.gz" -C dist "ladon-linux-${ARCH}-${TAG}"
          # sha256 file must contain the bare filename so `sha256sum -c` works
          # when the user downloads the tarball into an arbitrary directory.
          (cd dist && sha256sum "ladon-linux-${ARCH}.tar.gz" \
            > "ladon-linux-${ARCH}.tar.gz.sha256")

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladon-linux-${{ matrix.arch }}
          path: |
            dist/ladon-linux-${{ matrix.arch }}.tar.gz
            dist/ladon-linux-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 7

  build-openwrt:
    # OpenWRT tarballs ship side-by-side with the Debian ones. Same binary
    # (Go static, CGO_ENABLED=0), different bundle: procd init unit instead
    # of systemd, OpenWRT config example. The install.sh in both tarballs
    # is the same unified dispatcher that detects OS at runtime. Arch names
    # here mirror what `opkg print-architecture` yields.
    name: 🏗 build openwrt ${{ matrix.tarball_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tarball_arch: aarch64
            goarch: arm64
            goarm: ""
            gomips: ""
          - tarball_arch: armv7
            goarch: arm
            goarm: "7"
            gomips: ""
          # mipsel_24kc intentionally absent: modernc.org/libc (transitive dep
          # of modernc.org/sqlite) doesn't ship build files for linux/mipsle.
          # Bringing MIPS back means either a different pure-Go SQLite backend
          # (e.g. ncruces/go-sqlite3 via wazero) or a CGO build with musl-mips
          # toolchain — both larger refactors. Tracked in v1.5+ backlog.
          - tarball_arch: x86_64
            goarch: amd64
            goarm: ""
            gomips: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build static binary (openwrt)
        env:
          TARBALL_ARCH: ${{ matrix.tarball_arch }}
          GOARCH_OVERRIDE: ${{ matrix.goarch }}
          GOARM_OVERRIDE: ${{ matrix.goarm }}
          GOMIPS_OVERRIDE: ${{ matrix.gomips }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          STAGE="dist/ladon-openwrt-${TARBALL_ARCH}-${TAG}"
          mkdir -p "${STAGE}"
          CGO_ENABLED=0 GOOS=linux GOARCH="${GOARCH_OVERRIDE}" \
            GOARM="${GOARM_OVERRIDE}" GOMIPS="${GOMIPS_OVERRIDE}" \
            go build -trimpath -ldflags="-s -w -X main.version=${TAG}" \
            -o "${STAGE}/ladon" ./cmd/ladon

          # OpenWRT-specific runtime bundle. procd unit instead of systemd;
          # OpenWRT-flavoured config example with /tmp/ /usr/share/ /var/lib paths.
          cp release/ladon.init                       "${STAGE}/"
          cp release/manual-allow.txt.example         "${STAGE}/"
          cp release/manual-deny.txt.example          "${STAGE}/"
          cp release/config.yaml.openwrt.example      "${STAGE}/"
          cp release/install.sh                       "${STAGE}/"
          cp release/uninstall.sh                     "${STAGE}/"
          cp -r release/extensions                    "${STAGE}/"

          tar -czf "dist/ladon-openwrt-${TARBALL_ARCH}.tar.gz" -C dist "ladon-openwrt-${TARBALL_ARCH}-${TAG}"
          (cd dist && sha256sum "ladon-openwrt-${TARBALL_ARCH}.tar.gz" \
            > "ladon-openwrt-${TARBALL_ARCH}.tar.gz.sha256")

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladon-openwrt-${{ matrix.tarball_arch }}
          path: |
            dist/ladon-openwrt-${{ matrix.tarball_arch }}.tar.gz
            dist/ladon-openwrt-${{ matrix.tarball_arch }}.tar.gz.sha256
          retention-days: 7

  publish:
    name: 📦 publish release
    needs: [build, build-openwrt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list bundle
        run: ls -la dist/

      - name: stage standalone install scripts
        # Publish install.sh / uninstall.sh as separate release assets too,
        # so the recommended one-liner can fetch them via the predictable
        # /releases/latest/download/<name>.sh URL without unpacking a tarball.
        # A single script dispatches Debian vs OpenWRT by sniffing
        # /etc/openwrt_release vs /etc/os-release.
        run: |
          cp release/install.sh   dist/install.sh
          cp release/uninstall.sh dist/uninstall.sh
          chmod +x dist/*.sh

      - name: publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/install.sh
            dist/uninstall.sh
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
